name: Type check
on:
  push:
    branches: [main, staging]
  pull_request:
jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install --legacy-peer-deps
        working-directory: .
      - run: npx tsc --noEmit
        working-directory: .
